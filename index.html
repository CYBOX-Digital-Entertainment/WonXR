<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111418" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="WonXR" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
    <link rel="icon" href="%BASE_URL%icons/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%BASE_URL%icons/icon-16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="%BASE_URL%icons/icon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="%BASE_URL%icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <title>WonXR 교리도 AR</title>
  </head>
  <body>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);

        if (params.get('resetCache') !== '1') {
          return;
        }

        const reset = async () => {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(
              registrations
                .filter((registration) => registration.scope.includes('/WonXR/'))
                .map((registration) => registration.unregister()),
            );
          }

          if ('caches' in window) {
            const cacheNames = await caches.keys();
            await Promise.all(
              cacheNames
                .filter((name) => name.toLowerCase().includes('wonxr') || name.includes('WonXR'))
                .map((name) => caches.delete(name)),
            );
          }

          for (const storage of [window.localStorage, window.sessionStorage]) {
            for (const key of Object.keys(storage)) {
              if (key.toLowerCase().includes('wonxr')) {
                storage.removeItem(key);
              }
            }
          }

          window.location.replace(`/WonXR/?mode=main&cacheBust=${Date.now()}`);
        };

        reset().catch(() => {
          window.location.replace(`/WonXR/?mode=main&cacheBust=${Date.now()}`);
        });
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
